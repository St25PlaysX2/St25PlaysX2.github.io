<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grandmas TV</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden; }

        #viewport {
            width: 100vw; height: 100vh;
            overflow: hidden; position: relative;
        }

        #tv-frame {
            width: 100%; height: 100%;
            border: none;
            position: absolute;
            top: 0; left: 0;
            transition: transform 0.3s ease;
        }

        /* THE SHIELD: Prevents Grandma from accidentally clicking/stopping the video */
        #focus-shield {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99;
            background: transparent;
            pointer-events: all; /* Clicks are blocked by default */
        }

        /* THE MAINTENANCE MODE: Triggered by CTRL+SPACE */
        #focus-shield.unlocked {
            pointer-events: none; /* Clicks pass through to the website */
            border: 15px solid rgba(255, 0, 0, 0.5); /* Visual reminder that it's unlocked */
            box-sizing: border-box;
        }

        #channel-notifier {
            position: absolute; top: 30px; left: 30px;
            background: rgba(0, 120, 215, 0.9); color: white;
            padding: 10px 30px; font-family: sans-serif;
            font-size: 3rem; font-weight: bold; border-radius: 5px;
            z-index: 100; display: none;
        }
    </style>
</head>
<body onload="loadChannel(0)">

    <div id="channel-notifier"></div>
    <div id="focus-shield"></div>

    <div id="viewport">
        <iframe id="tv-frame" src="" allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        const channels = [
            { name: "Antenna", url: "https://www.antenna.gr/live", scale: 1.2, top: "-8%" },
            { name: "Star", url: "https://www.star.gr/tv/live-stream", scale: 2.0, top: "25%" },
            { name: "Mega", url: "https://www.megatv.com/live/", scale: 1.2, top: "-5%" }
        ];

        let currentIndex = 0;
        let unlockTimer = null;
        const frame = document.getElementById('tv-frame');
        const shield = document.getElementById('focus-shield');
        const notifier = document.getElementById('channel-notifier');

        function showStatus(text, duration = 3000) {
            notifier.innerText = text;
            notifier.style.display = "block";
            clearTimeout(window.notifTimeout);
            if (duration > 0) {
                window.notifTimeout = setTimeout(() => { notifier.style.display = "none"; }, duration);
            }
        }

        function lockSystem() {
            shield.classList.remove('unlocked');
            window.focus();
            showStatus("LOCKED", 1000);
        }

        function loadChannel(newIndex) {
            currentIndex = (newIndex + channels.length) % channels.length;
            const ch = channels[currentIndex];

            frame.src = "about:blank";

            frame.style.transform = `scale(${ch.scale})`;
            frame.style.top = ch.top;

            setTimeout(() => {
                frame.src = ch.url;
                showStatus(ch.name, 4000);
                lockSystem(); // Relock on every channel change
            }, 100);
        }

        window.addEventListener('keydown', (e) => {
            // THE UNLOCK KEY: CTRL + SPACE
            if (e.ctrlKey && e.code === 'Space') {
                shield.classList.add('unlocked');
                showStatus("UNLOCKED (5s)", 5000);
                clearTimeout(unlockTimer);
                unlockTimer = setTimeout(lockSystem, 15000); // Auto-lock after 15 seconds
                return;
            }

            // ONLY NAVIGATE IF LOCKED (prevents keys messing with the website)
            if (!shield.classList.contains('unlocked')) {
                if (e.key === "ArrowRight") loadChannel(currentIndex + 1);
                if (e.key === "ArrowLeft") loadChannel(currentIndex - 1);
            }
        }, true);

        // Keep the browser window focused so it hears the remote/keyboard
        setInterval(() => {
            if (!shield.classList.contains('unlocked')) {
                window.focus();
            }
        }, 1000);
    </script>
</body>
</html>
